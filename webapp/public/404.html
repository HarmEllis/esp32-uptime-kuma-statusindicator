<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1a2e" />
    <title>ESP32 Uptime Kuma Monitor</title>
    <script>
      // SPA fallback for GitHub Pages: preserve the path so the app router
      // can handle it after the redirect.
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      window.location.replace(
        window.location.origin +
          '/esp32-uptime-kuma-statusindicator/' +
          '?__spa_redirect=' +
          encodeURIComponent(path + search + hash)
      );
    </script>
  </head>
  <body></body>
</html>
