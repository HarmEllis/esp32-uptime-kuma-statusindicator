name: Build Firmware

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to build and release (e.g. v1.2.3)"
        required: false
        type: string
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.3
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag != '' && inputs.release_tag || github.ref }}

      - name: Build firmware
        shell: bash
        run: |
          source /opt/esp/idf/export.sh
          cd firmware
          idf.py set-target esp32
          idf.py build

      - name: Rename binaries
        run: |
          cp firmware/build/esp32-uptimemonitor.bin firmware-esp32.bin
          cp firmware/build/bootloader/bootloader.bin bootloader-esp32.bin
          cp firmware/build/partition_table/partition-table.bin partition-table-esp32.bin

      - uses: actions/upload-artifact@v4
        with:
          name: firmware-esp32
          path: |
            firmware-esp32.bin
            bootloader-esp32.bin
            partition-table-esp32.bin

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          files: firmware-esp32/*
